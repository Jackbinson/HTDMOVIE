services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: htdmovie-backend-1
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=postgres
      - DB_USER=jack
      - DB_PASSWORD=admin123
      - DB_NAME=HTDMOVIE
      - REDIS_HOST=redis
      - JWT_SECRET=htdmovie_secret_key_123
    depends_on:
      - postgres
      - redis
    networks:
      - htd-network
    volumes:
      - ./backend:/usr/src/app
      - ./backend/uploads:/usr/src/app/uploads

  frontend:
    build:
      context: ./htdmovie-frontend
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - htd-network

  redis:
    image: redis:alpine
    container_name: ticket_redis
    ports:
      - "6379:6379"
    networks:
      - htd-network

  postgres:
    container_name: ticket_postgres
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jack
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: HTDMOVIE
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database:/docker-entrypoint-initdb.d
    networks:
      - htd-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: ticket_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - htd-network

networks:
  htd-network:
    driver: bridge

volumes:
  pgdata:
